name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build with Buildozer (Docker)
        run: |
          docker run --rm -v ${{ github.workspace }}:/home/user/hostcwd -v ${{ github.workspace }}/.buildozer_global:/home/user/.buildozer_global -e USER=user --entrypoint /bin/bash kivy/buildozer:latest -c "sudo apt-get update && sudo apt-get install -y wget && cd /home/user/hostcwd && buildozer android debug"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swift-compressor-debug-apk
          path: bin/*.apk
