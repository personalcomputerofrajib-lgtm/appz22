name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            .buildozer_global
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v3

      - name: Build with Buildozer (Docker)
        run: |
          # Create directories and ensure they are writable by the container user
          mkdir -p .buildozer .buildozer_global
          chmod -R 777 .buildozer .buildozer_global
          
          docker run --rm \
            -v ${{ github.workspace }}:/home/user/hostcwd \
            -v ${{ github.workspace }}/.buildozer_global:/home/user/.buildozer \
            -e HOME=/home/user \
            --entrypoint /bin/bash kivy/buildozer:latest -c "
              apt-get update && apt-get install -y wget && \
              git config --global --add safe.directory '*' && \
              cd /home/user/hostcwd && \
              yes | buildozer android debug
            "

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: swift-compressor-debug-apk
          path: bin/*.apk
